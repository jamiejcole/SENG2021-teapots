openapi: '3.0.3'
info:
  description: |
    A UBL ordering API that generates the UBL XML based on JSON objects of the UBL parameters. 

    Supports:
    -  Authentication for future retrieval of orders
    -  The ability to create orders without needing an account
    -  AI tools, like AI summarise. More tools coming soon.
    -  XML and UBL verification.
  version: '1.0.0'
  title: OrderMS UBL Ordering

servers:
  - url: https://api.orderms.tech/v1

tags:
  - name: Auth
    description: Operations for authentication
  - name: Orders
    description: Operations about the orders
  - name: Health
    description: Operations about the system health
  - name: Summary
    description: AI summary operations

paths:
  '/health':
    get:
      tags:
        - Health
      summary: Health check
      description: Checks if the Order service is alive and running.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: "healthy"
                service: "order"
                message: "Order Creation API is running."
        '503':
          description: Service is unhealthy

  '/summary':
    post:
      tags:
        - Summary
      summary: Generates an AI summary of the users orders
      description: | 
        Generates an AI summary for all user orders or selected order IDs. 
        
        On submitting an empty body `{}` all  the user's orders will be summarised.

        Line length determines the number of lines returned by the LLM. Max 10 lines.
      parameters:
        - $ref: '#/components/parameters/token'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SummaryRequest'
      responses:
        '200':
          description: Summary generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryResponse'
              example:
                summary: "One order is for Red Paint with UNSW Engineering as both the buyer and the seller, settled in AUD. The other order is for Blue Paint, with Havard Engineering as the buyer and UNSW Engineering as the seller, settled in USD."
        '401':
          description: Missing or invalid token
        '429':
          description: Daily AI rate limit reached. Currently set at 15 requests per day, but it may be increased on demand depending on usage.
        '503':
          description: Server, AI or database error

  '/auth/register':
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Registers a new user account for accessing the Order API and returns a session token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                userId: "b3bfab067ae94b4271d86dc0d389f3e9"
                token: "c5e8ba22-64ad-452e-8e96-5479d9bb3dba"
        '400':
          description: |
            If any of the following are true:
            - Missing / invalid fields
            - Weak password
              - Password is less than 8 characters
              - Password does not contain a letter or number
            - Email already in use
            - Invalid email format
  '/auth/login':
    post:
      tags:
        - Auth
      summary: Login an user
      description: Logs in an existing user and returns a token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                userId: "b3bfab067ae94b4271d86dc0d389f3e9"
                token: "c5e8ba22-64ad-452e-8e96-5479d9bb3dba"
        '400':
          description: Missing fields
        '401':
          description: |
            If any of the following is true:
            - User not found
            - Wrong password

  '/auth/logout':
    post:
      tags:
        - Auth
      summary: Logout
      description: Logs out the current user (invalidates token session).
      parameters:
        - $ref: '#/components/parameters/token'
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                status: "success"
                message: "Logged out."
        '401':
          description: Token missing or invalid

  '/orders':
    post:
      tags:
        - Orders
      summary: Create order
      description: |
        Creates a new Order and generates a UBL 2.1 XML Order document based on user-provided data. 
        
        Supports all UBL parameters. 
        
        When creating the request body, the JSON parameters are the same name as the UBL spec parameters.
      parameters:
        - name: token
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            example:
              ID: "ORD-001"
              IssueDate: "2026-03-16"
              BuyerCustomerParty:
                Party:
                  PartyName:
                    - Name: "Test Buyer"
              SellerSupplierParty:
                Party:
                  PartyName:
                    - Name: "Test Seller"
              OrderLine:
                - LineItem:
                    ID: "LINE-001"
                    Item:
                      Description:
                        - "Test Item"
                      Name: "Test Product"
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
              example:
                orderId: "34"
                status: "success"
                ublXmlUrl: "/order/orders/34/xml"
        '400':
          description: Missing required fields / invalid items / invalid date format
        '401':
          description: Token missing or invalid
        '500':
          description: XML generation failure
    get:
      tags:
        - Orders
      summary: List orders
      description: Lists orders created by the logged-in user.
      parameters:
        - $ref: '#/components/parameters/token'
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderRecord'
              example:
                - _id: "69b77420ef44623e06626ba5"
                  data:
                    ID: "ORD-001"
                    IssueDate: "2026-03-16"
                    BuyerCustomerParty:
                      Party:
                        PartyName:
                          - Name: "Test Buyer updated"
                    SellerSupplierParty:
                      Party:
                        PartyName:
                          - Name: "Test Seller"
                    OrderLine:
                      - LineItem:
                          ID: "LINE-001"
                          Item:
                            Description:
                              - "Test Item"
                            Name: "Test Product"
                  orderId: "df31bd828ae2f3f2a36dc0f4bb1d4027"
                  createdAt: "2026-03-16T03:08:16.211Z"
                  modifiedAt: "2026-03-16T03:09:24.022Z"
                  url: "https://api.orderms.tech/orders/df31bd828ae2f3f2a36dc0f4bb1d4027/xml"
                  userId: "53a85f8e38ee13317cfc0332328ceeb2"
        '401':
          description: Unauthorized

  '/orders/{orderId}':
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Retrieves a stored order. Returns the JSON version of the UBL document. Use the GET /orders/{orderId}/xml route to get the xml version of the UBL.
      parameters:
        - name: token
          in: header
          required: false
          schema:
            type: string
        - name: orderId
          in: path
          description: ID of the order
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderRecord'
              example:
                orderId: "df31bd828ae2f3f2a36dc0f4bb1d4027"
                ID: "ORD-001"
                IssueDate: "2026-03-16"
                BuyerCustomerParty:
                  Party:
                    PartyName:
                      - Name: "Test Buyer updated"
                SellerSupplierParty:
                  Party:
                    PartyName:
                      - Name: "Test Seller"
                OrderLine:
                  - LineItem:
                      ID: "LINE-001"
                      Item:
                        Description:
                          - "Test Item"
                        Name: "Test Product"
        '400':
          description: Malformed orderId
        '401':
          description: Token invalid
        '403':
          description: Not owner of the order
        '404':
          description: Order does not exist
    put:
      tags:
        - Orders
      summary: Update order
      description: Updates an existing order. GET order can be used to retrieve the order so that changes can be made to it.
      parameters:
        - name: token
          in: header
          required: false
          schema:
            type: string
        - name: orderId
          in: path
          description: ID of the order to update
          required: true
          schema:
            type: string
      requestBody:
        description: Updated order data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            example:
              ID: "ORD-001"
              IssueDate: "2026-03-16"
              BuyerCustomerParty:
                Party:
                  PartyName:
                    - Name: "Test Buyer updated"
              SellerSupplierParty:
                Party:
                  PartyName:
                    - Name: "Test Seller"
              OrderLine:
                - LineItem:
                    ID: "LINE-001"
                    Item:
                      Description:
                        - "Test Item"
                      Name: "Test Product"
      responses:
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
              example:
                orderId: 34
                ublXmlUrl: "/order/orders/34/xml"
        '400':
          description: Invalid update payload
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
    delete:
      tags:
        - Orders
      summary: Delete order
      description: Deletes an order from the system.
      parameters:
        - name: token
          in: header
          required: false
          schema:
            type: string
        - name: orderId
          in: path
          description: ID of the order to delete
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                status: "deleted"
                message: "Order deleted successfully."
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  '/orders/{orderId}/xml':
    get:
      tags:
        - Orders
      summary: Get order as UBL 2.1 XML
      description: |
        Returns the generated UBL 2.1 XML Order document.
      parameters:
        - name: token
          in: header
          required: false
          schema:
            type: string
        - name: orderId
          in: path
          description: ID of the order
          required: true
          schema:
            type: string
      responses:
        '200':
          description: UBL 2.1 XML document
          content:
            application/xml:
              schema:
                type: object
                xml:
                  name: Order
                  namespace: 'urn:oasis:names:specification:ubl:schema:xsd:Order-2'
              example: |
                <?xml version="1.0" encoding="UTF-8"?>
                <Order xmlns:cbc="urn:oasis:names:specification:ubl:schema:xsd:CommonBasicComponents-2"
                       xmlns:cac="urn:oasis:names:specification:ubl:schema:xsd:CommonAggregateComponents-2"
                       xmlns="urn:oasis:names:specification:ubl:schema:xsd:Order-2">
                  <cbc:UBLVersionID>2.1</cbc:UBLVersionID>
                  <cbc:CustomizationID>urn:oasis:names:specification:ubl:xpath:Order-2.1:sbs-1.0</cbc:CustomizationID>
                  <cbc:ProfileID>bpid:urn:oasis:names:bpss:ubl-2-sbs-order-with-simple-response</cbc:ProfileID>
                  <cbc:ID>34</cbc:ID>
                  <cbc:CopyIndicator>false</cbc:CopyIndicator>
                  <cbc:UUID>6E09886B-DC6E-439F-82D1-7CCAC7F4E3B1</cbc:UUID>
                  <cbc:IssueDate>2026-02-26</cbc:IssueDate>
                  <cbc:DocumentCurrencyCode>AUD</cbc:DocumentCurrencyCode>
                  <cac:BuyerCustomerParty>
                    <cbc:CustomerAssignedAccountID>7300072311115</cbc:CustomerAssignedAccountID>
                    <cac:Party>
                      <cac:PartyName>
                        <cbc:Name>UNSW Engineering</cbc:Name>
                      </cac:PartyName>
                      <cac:PostalAddress>
                        <cbc:StreetName>High Street</cbc:StreetName>
                        <cbc:CityName>Sydney</cbc:CityName>
                        <cbc:PostalZone>2052</cbc:PostalZone>
                        <cbc:CountrySubentity>New South Wales</cbc:CountrySubentity>
                        <cac:Country>
                          <cbc:IdentificationCode>AU</cbc:IdentificationCode>
                        </cac:Country>
                      </cac:PostalAddress>
                      <cac:Contact>
                        <cbc:Name>Procurement Office</cbc:Name>
                        <cbc:ElectronicMail>procurement@unsw.edu.au</cbc:ElectronicMail>
                      </cac:Contact>
                    </cac:Party>
                  </cac:BuyerCustomerParty>
                  <cac:SellerSupplierParty>
                    <cbc:CustomerAssignedAccountID>SIS001</cbc:CustomerAssignedAccountID>
                    <cac:Party>
                      <cac:PartyName>
                        <cbc:Name>Sydney Industrial Supplies Pty Ltd</cbc:Name>
                      </cac:PartyName>
                      <cac:PostalAddress>
                        <cbc:StreetName>Industrial Avenue</cbc:StreetName>
                        <cbc:CityName>Sydney</cbc:CityName>
                        <cbc:PostalZone>2000</cbc:PostalZone>
                        <cbc:CountrySubentity>New South Wales</cbc:CountrySubentity>
                        <cac:Country>
                          <cbc:IdentificationCode>AU</cbc:IdentificationCode>
                        </cac:Country>
                      </cac:PostalAddress>
                      <cac:Contact>
                        <cbc:Name>Sales Department</cbc:Name>
                        <cbc:ElectronicMail>sales@sydneyindustrial.com.au</cbc:ElectronicMail>
                      </cac:Contact>
                    </cac:Party>
                  </cac:SellerSupplierParty>
                  <cac:Delivery>
                    <cac:RequestedDeliveryPeriod>
                      <cbc:StartDate>2026-02-26</cbc:StartDate>
                      <cbc:StartTime>12:30:00Z</cbc:StartTime>
                    </cac:RequestedDeliveryPeriod>
                  </cac:Delivery>
                  <cac:TransactionConditions>
                    <cbc:Description>order response required; payment is by EFT</cbc:Description>
                  </cac:TransactionConditions>
                  <cac:AnticipatedMonetaryTotal>
                    <cbc:LineExtensionAmount currencyID="AUD">6000.00</cbc:LineExtensionAmount>
                    <cbc:PayableAmount currencyID="AUD">6000.00</cbc:PayableAmount>
                  </cac:AnticipatedMonetaryTotal>
                  <cac:OrderLine>
                    <cac:LineItem>
                      <cbc:ID>1</cbc:ID>
                      <cbc:LineStatusCode>NoStatus</cbc:LineStatusCode>
                      <cbc:Quantity unitCode="LTR">120</cbc:Quantity>
                      <cbc:LineExtensionAmount currencyID="AUD">6000.00</cbc:LineExtensionAmount>
                      <cac:Price>
                        <cbc:PriceAmount currencyID="AUD">50.00</cbc:PriceAmount>
                        <cbc:BaseQuantity unitCode="LTR">120</cbc:BaseQuantity>
                      </cac:Price>
                      <cac:Item>
                        <cbc:Name>Red paint</cbc:Name>
                      </cac:Item>
                    </cac:LineItem>
                  </cac:OrderLine>
                </Order>
        '401':
          description: Invalid bearer token is provided
        '403':
          description: Order does not belong to this user
        '404':
          description: Order not found

components:
  securitySchemes:
    bearer_auth:
      type: apiKey
      in: header
      name: Authorization

  parameters:
    token:
      in: header
      name: token
      required: true
      schema:
        type: string

  schemas:
    SummaryRequest:
      type: object
      required:
        - orderIds
        - lineLength
      properties:
        orderIds:
          type: array
          nullable: true
          description: Optional list of order IDs to summarise. If left empty, or not given, then all the user's orders are summarised.
          items:
            type: string
          example: ["df31bd828ae2f3f2a36dc0f4bb1d4027", "a1b2c3d4e5f6789012345678901234ab"]
        lineLength:
          type: integer
          nullable: true
          description: Number of summary lines requested. If not provided, defaults to 3. Maximum of 10 lines.
          example: 3

    SummaryResponse:
      type: object
      properties:
        summary:
          type: string
          description: AI-generated order summary.
          example: "One order is for Red Paint with UNSW Engineering as both the buyer and the seller, settled in AUD. The other order is for Blue Paint, with Havard Engineering as the buyer and UNSW Engineering as the seller, settled in USD."

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "healthy"
        service:
          type: string
          example: "order"
        message:
          type: string
          example: "Order Creation API is running."

    MessageResponse:
      type: object
      properties:
        status:
          type: string
          example: "deleted"
        message:
          type: string
          example: "Operation successful."

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - nameFirst
        - nameLast
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: "user@example.com"
        password:
          type: string
          minLength: 8
          description: User password
          example: "StrongPassword123!"
        nameFirst:
          type: string
          description: User first name
          example: "Dennis"
        nameLast:
          type: string
          description: User last name
          example: "Ritchie"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: "user@example.com"
        password:
          type: string
          description: User password
          example: "StrongPassword123!"

    AuthResponse:
      type: object
      properties:
        userId:
          type: string
          description: Unique identifier of the authenticated user
          example: "b3bfab067ae94b4271d86dc0d389f3e9"
        token:
          type: string
          description: Bearer token for subsequent authenticated requests
          example: "c5e8ba22-64ad-452e-8e96-5479d9bb3dba"

    Party:
      type: object
      required:
        - name
        - endpointId
      properties:
        name:
          type: string
          description: Organisation name
          example: "UNSW Engineering"
        endpointId:
          type: string
          description: GLN or other endpoint identifier
          example: "7300072311115"

    OrderItem:
      type: object
      required:
        - lineId
        - name
        - quantity
        - unitCode
        - price
      properties:
        lineId:
          type: string
          description: Line item identifier
          example: "1"
        name:
          type: string
          description: Item name
          example: "Red Paint"
        quantity:
          type: integer
          description: Quantity ordered
          example: 120
        unitCode:
          type: string
          description: Unit of measure code (UN/ECE Rec 20)
          example: "LTR"
        price:
          type: number
          format: float
          description: Unit price
          example: 50.00

    OrderCreateRequest:
      type: object
      description: Order creation payload based on UBL Order structure
      required:
        - issueDate
        - issueTime
        - currency
        - buyer
        - seller
        - items
      properties:
        orderId:
          type: string
          description: Client-supplied order identifier (maps to cbc:ID)
          example: "34"
        issueDate:
          type: string
          format: date
          description: Issue date (maps to cbc:IssueDate)
          example: "2026-02-26"
        issueTime:
          type: string
          description: Issue time in UTC (maps to cbc:IssueTime)
          example: "12:30:00Z"
        currency:
          type: string
          description: Document currency code (maps to cbc:DocumentCurrencyCode)
          example: "AUD"
        buyer:
          $ref: '#/components/schemas/Party'
        seller:
          $ref: '#/components/schemas/Party'
        items:
          type: array
          description: Line items for the order
          items:
            $ref: '#/components/schemas/OrderItem'

    OrderCreateResponse:
      type: object
      properties:
        orderId:
          type: string
          description: Unique identifier of the created/updated order
          example: 34
        status:
          type: string
          example: "success"
        ublXmlUrl:
          type: string
          description: URL to retrieve the generated UBL XML
          example: "/order/orders/34/xml"

    OrderRecord:
      type: object
      description: Full order record including metadata and input fields
      properties:
        _id:
          type: string
          example: "69b77420ef44623e06626ba5"
        data:
          type: object
          description: Raw UBL-style order payload
        orderId:
          type: string
          example: "df31bd828ae2f3f2a36dc0f4bb1d4027"
        createdAt:
          type: string
          format: date-time
          example: "2026-03-16T03:08:16.211Z"
        modifiedAt:
          type: string
          format: date-time
          example: "2026-03-16T03:09:24.022Z"
        url:
          type: string
          example: "https://api.orderms.tech/orders/df31bd828ae2f3f2a36dc0f4bb1d4027/xml"
        userId:
          type: string
          example: "53a85f8e38ee13317cfc0332328ceeb2"

    OrderSummary:
      type: object
      description: Summary of an order for list responses
      properties:
        orderId:
          type: string
          example: "34"
        issueDate:
          type: string
          format: date
          example: "2026-02-26"
        currency:
          type: string
          example: "SEK"

    OrderListResponse:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          description: Total number of orders for the user
          example: 2
        orders:
          type: array
          items:
            $ref: '#/components/schemas/'
