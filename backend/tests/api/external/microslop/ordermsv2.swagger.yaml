components:
  securitySchemes:
    bearer_auth:
      type: apiKey
      in: header
      name: Authorization

  parameters:
    token:
      in: header
      name: token
      required: true
      schema:
        type: string

  schemas:
    SummaryRequest:
      type: object
      required:
        - orderIds
        - lineLength
      properties:
        orderIds:
          type: array
          nullable: true
          description: Optional list of order IDs to summarise. If left empty, or not given, then all the user's orders are summarised.
          items:
            type: string
          example: ["df31bd828ae2f3f2a36dc0f4bb1d4027", "a1b2c3d4e5f6789012345678901234ab"]
        lineLength:
          type: integer
          nullable: true
          description: Number of summary lines requested. If not provided, defaults to 3. Maximum of 10 lines.
          example: 3

    SummaryResponse:
      type: object
      properties:
        summary:
          type: string
          description: AI-generated order summary.
          example: "One order is for Red Paint with UNSW Engineering as both the buyer and the seller, settled in AUD. The other order is for Blue Paint, with Havard Engineering as the buyer and UNSW Engineering as the seller, settled in USD."
        remainingDailyRequests:
          type: integer
          description: Remaining number of daily AI summary requests for the user.
          example: 7

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "healthy"
        service:
          type: string
          example: "order"
        message:
          type: string
          example: "Order Creation API is running."

    MessageResponse:
      type: object
      properties:
        status:
          type: string
          example: "deleted"
        message:
          type: string
          example: "Operation successful."

    PartyRegisterRequest:
      type: object
      description: Party registration payload using UBL party field names.
      required:
        - PartyName
        - PostalAddress
        - PartyTaxScheme
        - Contact
      properties:
        PartyName:
          type: array
          items:
            $ref: '#/components/schemas/PartyNameEntry'
        PostalAddress:
          $ref: '#/components/schemas/PostalAddress'
        PartyTaxScheme:
          type: array
          items:
            $ref: '#/components/schemas/PartyTaxSchemeEntry'
        Contact:
          $ref: '#/components/schemas/Contact'

    PartyRegisterResponse:
      type: object
      properties:
        userId:
          type: string
          example: "user-123"
        partyId:
          type: string
          example: "7f3219e7cbddbd04e2b20f3ebaa022d7"
        party:
          $ref: '#/components/schemas/PartyRegisterRequest'

    PartyDeleteResponse:
      type: object
      required:
        - status
        - message
        - partyId
      properties:
        status:
          type: string
          example: "deleted"
        message:
          type: string
          example: "Party deleted successfully."
        partyId:
          type: string
          example: "7f3219e7cbddbd04e2b20f3ebaa022d7"

    PartyNameEntry:
      type: object
      required:
        - Name
      properties:
        Name:
          type: string
          example: "UNSW Bookshop"

    PostalAddress:
      type: object
      required:
        - StreetName
        - BuildingName
        - BuildingNumber
        - CityName
        - PostalZone
        - CountrySubentity
        - AddressLine
        - Country
      properties:
        StreetName:
          type: string
          example: "High Street"
        BuildingName:
          type: string
          example: "Business Building"
        BuildingNumber:
          type: string
          example: "E12"
        CityName:
          type: string
          example: "Kensington"
        PostalZone:
          type: string
          example: "2033"
        CountrySubentity:
          type: string
          example: "NSW"
        AddressLine:
          type: array
          items:
            $ref: '#/components/schemas/AddressLine'
        Country:
          $ref: '#/components/schemas/Country'

    AddressLine:
      type: object
      required:
        - Line
      properties:
        Line:
          type: string
          example: "Floor LG"

    Country:
      type: object
      required:
        - IdentificationCode
      properties:
        IdentificationCode:
          type: string
          example: "AU"

    PartyTaxSchemeEntry:
      type: object
      required:
        - RegistrationName
        - CompanyID
        - TaxScheme
      properties:
        RegistrationName:
          type: string
          example: "UNSW Bookshop"
        CompanyID:
          type: string
          example: "12356478"
        TaxScheme:
          $ref: '#/components/schemas/TaxScheme'

    TaxScheme:
      type: object
      required:
        - ID
        - TaxTypeCode
      properties:
        ID:
          type: string
          example: "AU GST"
        TaxTypeCode:
          type: string
          example: "GST"

    Contact:
      type: object
      required:
        - Name
        - Telephone
        - Telefax
        - ElectronicMail
      properties:
        Name:
          type: string
          example: "Prof. Martin Green"
        Telephone:
          type: string
          example: "03 12345678"
        Telefax:
          type: string
          example: "03 12345678"
        ElectronicMail:
          type: string
          format: email
          example: "books@unsw.edu.au"

    ProductCreateRequest:
      type: object
      description: Product creation payload based on the UBL LineItem structure.
      required:
        - Item
      properties:
        UBLExtensions:
          type: object
          description: Optional UBL extensions container.
          example: {}
        ID:
          type: string
          description: Optional product line identifier. Auto-generated if omitted.
          example: "LINE-001"
        Item:
          $ref: '#/components/schemas/ProductItem'

    ProductItem:
      type: object
      description: Core UBL Item fields for product creation.
      required:
        - Name
      properties:
        Name:
          type: string
          example: "Ergonomic Chair"
        Description:
          type: array
          items:
            type: string
          example:
            - "Mesh back, black, adjustable lumbar support"
        ModelName:
          type: array
          items:
            type: string
          example:
            - "ERGO-MESH-BLK"

    ProductCreateResponse:
      type: object
      required:
        - userId
        - partyId
        - productId
        - lineItem
        - createdAt
        - modifiedAt
      properties:
        userId:
          type: string
          example: "b3bfab067ab94b4271d86dc0d389f3e9"
        partyId:
          type: string
          example: "7f3219e7cbddbd04e2b20f3ebaa022d7"
        productId:
          type: string
          example: "99c71fc6a5ca6b465f04c6f91ee0fca2"
        lineItem:
          $ref: '#/components/schemas/ProductCreateRequest'
        createdAt:
          type: string
          format: date-time
          example: "2026-03-16T03:08:16.211Z"
        modifiedAt:
          type: string
          format: date-time
          example: "2026-03-16T03:09:24.022Z"

    ProductDeleteResponse:
      type: object
      required:
        - status
        - message
        - productId
      properties:
        status:
          type: string
          example: "deleted"
        message:
          type: string
          example: "Product deleted successfully."
        productId:
          type: string
          example: "99c71fc6a5ca6b465f04c6f91ee0fca2"

    ProductListResponse:
      type: object
      description: List-products response with optional pagination metadata
      properties:
        page:
          type: integer
          example: 1
          nullable: true
          description: Requested page number when pagination is used.
        pageSize:
          type: integer
          example: 10
          nullable: true
          description: Requested page size when pagination is used.
        orders:
          type: array
          description: Array of product records returned by the current implementation.
          items:
            $ref: '#/components/schemas/ProductCreateResponse'

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - nameFirst
        - nameLast
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: "user@example.com"
        password:
          type: string
          minLength: 8
          description: User password
          example: "StrongPassword123!"
        nameFirst:
          type: string
          description: User first name
          example: "Dennis"
        nameLast:
          type: string
          description: User last name
          example: "Ritchie"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: "user@example.com"
        password:
          type: string
          description: User password
          example: "StrongPassword123!"

    AuthResponse:
      type: object
      properties:
        userId:
          type: string
          description: Unique identifier of the authenticated user
          example: "b3bfab067ae94b4271d86dc0d389f3e9"
        token:
          type: string
          description: Bearer token for subsequent authenticated requests
          example: "c5e8ba22-64ad-452e-8e96-5479d9bb3dba"

    Party:
      type: object
      required:
        - name
        - endpointId
      properties:
        name:
          type: string
          description: Organisation name
          example: "UNSW Engineering"
        endpointId:
          type: string
          description: GLN or other endpoint identifier
          example: "7300072311115"

    OrderItem:
      type: object
      required:
        - lineId
        - name
        - quantity
        - unitCode
        - price
      properties:
        lineId:
          type: string
          description: Line item identifier
          example: "1"
        name:
          type: string
          description: Item name
          example: "Red Paint"
        quantity:
          type: integer
          description: Quantity ordered
          example: 120
        unitCode:
          type: string
          description: Unit of measure code (UN/ECE Rec 20)
          example: "LTR"
        price:
          type: number
          format: float
          description: Unit price
          example: 50.00

    OrderCreateRequest:
      type: object
      description: Order creation/update payload wrapping the UBL JSON data
      example:
        data:
          ID: "ORD-001"
          IssueDate: "2026-03-16"
          BuyerCustomerParty:
            Party:
              PartyName:
                - Name: "Test Buyer"
          SellerSupplierParty:
            Party:
              PartyName:
                - Name: "Test Seller"
          OrderLine:
            - LineItem:
                ID: "LINE-001"
                Item:
                  Description:
                    - "Test Item"
                  Name: "Test Product"
        sellerPartyId: "fc1f9d3d0a4e3edb5a64ab33c12554f2"
      required:
        - data
      properties:
        data:
          type: object
          description: The UBL JSON object to be parsed and stored. Field names match the UBL 2.1 spec.
          example:
            ID: "ORD-001"
            IssueDate: "2026-03-16"
            BuyerCustomerParty:
              Party:
                PartyName:
                  - Name: "Test Buyer"
            SellerSupplierParty:
              Party:
                PartyName:
                  - Name: "Test Seller"
            OrderLine:
              - LineItem:
                  ID: "LINE-001"
                  Item:
                    Description:
                      - "Test Item"
                    Name: "Test Product"
        sellerPartyId:
          type: string
          description: |
            Optional registered seller party ID to associate with this order.
            Pass an empty string or omit to leave unset.
            If a non-empty value is provided, it must correspond to a valid registered party.
          example: "fc1f9d3d0a4e3edb5a64ab33c12554f2"

    OrderCreateResponse:
      type: object
      properties:
        orderId:
          type: string
          description: Unique identifier of the created/updated order
          example: 34
        status:
          type: string
          example: "success"
        ublXmlUrl:
          type: string
          description: URL to retrieve the generated UBL XML
          example: "/order/orders/34/xml"

    OrderRecord:
      type: object
      description: Full order record including metadata and input fields
      properties:
        _id:
          type: string
          example: "69b77420ef44623e06626ba5"
        data:
          type: object
          description: Raw UBL-style order payload
        orderId:
          type: string
          example: "df31bd828ae2f3f2a36dc0f4bb1d4027"
        createdAt:
          type: string
          format: date-time
          example: "2026-03-16T03:08:16.211Z"
        modifiedAt:
          type: string
          format: date-time
          example: "2026-03-16T03:09:24.022Z"
        url:
          type: string
          example: "https://api.orderms.tech/orders/df31bd828ae2f3f2a36dc0f4bb1d4027/xml"
        userId:
          type: string
          example: "53a85f8e38ee13317cfc0332328ceeb2"

    OrderSummary:
      type: object
      description: Summary of an order for list responses
      properties:
        orderId:
          type: string
          example: "34"
        issueDate:
          type: string
          format: date
          example: "2026-02-26"
        currency:
          type: string
          example: "SEK"

    OrderListResponse:
      type: object
      description: List-orders response with optional pagination metadata
      properties:
        page:
          type: integer
          example: 1
          nullable: true
          description: Requested page number when pagination is used.
        pageSize:
          type: integer
          example: 10
          nullable: true
          description: Requested page size when pagination is used.
        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderRecord'
